<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>MEDSPORT R&D</title>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Экран выбора */
        #start-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .logo-img { width: 150px; border-radius: 15px; margin-bottom: 20px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .l-btn { padding: 15px 30px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; cursor: pointer; font-weight: bold; }

        /* Основной контейнер букв */
        #letters-area { position: absolute; inset: 0; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; pointer-events: auto; }
        
        /* Стили букв как в оригинале */
        .char-item { 
            width: 60px; height: 60px; 
            background: #30336b; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 30px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }

        /* Адаптация под мобильный (только если экран узкий) */
        @media (max-width: 600px) {
            .char-item { width: 40px; height: 40px; font-size: 18px; border-radius: 8px; }
            .row { gap: 5px; }
            #letters-area { padding: 10px; padding-bottom: 100px; }
        }

        /* Слоты */
        #slots-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-wrap: wrap; gap: 10px; width: 90%; justify-content: center; }
        .slot { width: 65px; height: 85px; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #4CAF50; }
        
        @media (max-width: 600px) {
            .slot { width: 40px; height: 55px; font-size: 24px; }
        }

        /* Управление */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 2000; }
        #read-btn { padding: 15px 40px; background: var(--primary); border: none; color: #fff; border-radius: 40px; font-weight: 900; font-size: 20px; cursor: pointer; }
        .circle-btn { width: 60px; height: 60px; background: #535c68; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; }

        #v-container { position: absolute; top: 15px; right: 15px; width: 100px; height: 75px; border-radius: 10px; overflow: hidden; border: 1px solid #fff; opacity: 0.5; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .dragging { position: absolute; z-index: 5000; pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="start-screen">
        <img src="logo.jpg" class="logo-img" onerror="this.style.display='none'">
        <div style="font-size: 30px; font-weight: 900; color: var(--primary); margin-bottom: 30px;">MEDSPORT</div>
        <div class="lang-grid">
            <button class="l-btn" onclick="initApp('az')">AZƏRBAYCAN</button>
            <button class="l-btn" onclick="initApp('ru')">РУССКИЙ</button>
        </div>
    </div>

    <div id="v-container"><video id="input_video" playsinline></video></div>
    <div id="letters-area">
        <div id="top-row" class="row"></div>
        <div id="bottom-row" class="row"></div>
    </div>
    <div id="slots-container"></div>
    <div id="controls" style="display: none;">
        <div class="circle-btn" onclick="location.reload()">🌐</div>
        <button id="read-btn" onclick="readAll()">ПРОЧИТАТЬ</button>
        <div class="circle-btn" onclick="clearSlots()">🗑️</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script>
        const data = {
            'az': { l: "ABCÇDEƏFGĞHXIİJKQLMNOÖPRSŞTUÜVYZ".split(''), c: 'az-AZ', b: 'OXUMAQ' },
            'ru': { l: "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split(''), c: 'ru-RU', b: 'ПРОЧИТАТЬ' }
        };
        let currentLang = 'ru-RU', activeObj = null, isDragging = false;
        const synth = window.speechSynthesis;

        function initApp(lang) {
            currentLang = data[lang].c;
            document.getElementById('read-btn').textContent = data[lang].b;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            const sc = document.getElementById('slots-container');
            sc.innerHTML = '';
            for(let i=0; i<8; i++) sc.innerHTML += '<div class="slot"><span></span></div>';
            const letters = data[lang].l;
            const mid = Math.ceil(letters.length / 2);
            renderRow('top-row', letters.slice(0, mid));
            renderRow('bottom-row', letters.slice(mid));
        }

        function renderRow(id, chars) {
            const row = document.getElementById(id);
            row.innerHTML = '';
            chars.forEach(c => {
                const div = document.createElement('div');
                div.className = 'char-item';
                div.textContent = c;
                div.ontouchstart = (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY, c);
                div.onmousedown = (e) => startDrag(e.clientX, e.clientY, c);
                row.appendChild(div);
            });
        }

        function startDrag(x, y, c) {
            isDragging = true;
            speak(c);
            activeObj = document.createElement('div');
            activeObj.className = 'char-item dragging';
            activeObj.textContent = c;
            activeObj.style.left = (x - 30) + 'px';
            activeObj.style.top = (y - 30) + 'px';
            document.body.appendChild(activeObj);
        }

        window.onmousemove = (e) => { if(isDragging) move(e.clientX, e.clientY); };
        window.ontouchmove = (e) => { if(isDragging) move(e.touches[0].clientX, e.touches[0].clientY); };

        function move(x, y) {
            activeObj.style.left = (x - 30) + 'px';
            activeObj.style.top = (y - 30) + 'px';
        }

        window.onmouseup = (e) => endDrag(e.clientX, e.clientY);
        window.ontouchend = (e) => endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);

        function endDrag(x, y) {
            if(!isDragging) return;
            document.querySelectorAll('.slot').forEach(s => {
                const r = s.getBoundingClientRect();
                if(x > r.left && x < r.right && y > r.top && y < r.bottom) {
                    s.querySelector('span').textContent = activeObj.textContent;
                    speak(activeObj.textContent);
                }
            });
            activeObj.remove();
            isDragging = false;
        }

        function readAll() {
            let word = "";
            document.querySelectorAll('.slot span').forEach(s => word += s.textContent);
            speak(word);
        }

        function clearSlots() {
            document.querySelectorAll('.slot span').forEach(s => s.textContent = "");
        }

        function speak(t) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = currentLang;
            synth.speak(u);
        }

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });
        const cam = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });
        cam.start();
    </script>
</body>
</html>
