<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEDSPORT R&D Nature</title>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --slot-bg: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        
        #start-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .logo-text { font-size: 40px; font-weight: 900; color: var(--primary); margin-bottom: 30px; letter-spacing: 2px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 500px; }
        .l-btn { padding: 25px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; cursor: pointer; font-weight: bold; font-size: 18px; text-transform: uppercase; }

        #v-container { position: absolute; top: 10px; right: 10px; width: 140px; height: 100px; border-radius: 12px; overflow: hidden; border: 2px solid #fff; opacity: 0.6; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #perimeter { position: absolute; inset: 0; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; pointer-events: auto; }
        
        .char-item { 
            width: 65px; height: 65px; background: #30336b; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: grab; 
        }

        .side-panel { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        #left-panel { left: 20px; }
        #right-panel { right: 20px; }
        .digit-item {
            width: 55px; height: 55px; background: #f0932b; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 26px; color: #fff; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #slots-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; justify-content: center; }
        .slot { width: 75px; height: 105px; background: var(--slot-bg); border: 2px dashed rgba(255,255,255,0.2); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; color: #4CAF50; font-weight: 900; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 2000; }
        #read-btn { padding: 15px 60px; background: var(--primary); border: none; color: #fff; border-radius: 50px; font-weight: 900; font-size: 24px; cursor: pointer; }
        .circle-btn { width: 60px; height: 60px; background: #535c68; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }

        .dragging { position: absolute; z-index: 5000; pointer-events: none; opacity: 0.9; transform: scale(1.2); border: 3px solid #fff; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="logo-text">MEDSPORT</div>
        <div class="lang-grid">
            <button class="l-btn" onclick="initApp('az')">AZƏRBAYCAN</button>
            <button class="l-btn" onclick="initApp('ru')">РУССКИЙ</button>
            <button class="l-btn" onclick="initApp('tr')">TÜRKÇE</button>
            <button class="l-btn" onclick="initApp('en')">ENGLISH</button>
        </div>
    </div>

    <div id="v-container"><video id="input_video" playsinline></video></div>
    <div id="perimeter"><div id="top-row" class="row"></div><div id="bottom-row" class="row"></div></div>
    <div id="left-panel" class="side-panel"></div>
    <div id="right-panel" class="side-panel"></div>
    <div id="slots-container"></div>
    <div id="controls" style="display: none;">
        <div class="circle-btn" onclick="location.reload()">🌐</div>
        <button id="read-btn" onclick="readAll()"></button>
        <div class="circle-btn" onclick="clearSlots()">🗑️</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        const data = {
            'az': { l: "ABCÇDEƏFGĞHXIİJK".split(''), l2: "QLMNOÖPRSŞTUÜVYZ".split(''), c: 'az-AZ', b: 'OXUMAQ' },
            'ru': { l: "АБВГДЕЁЖЗИЙКЛМ".split(''), l2: "НОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split(''), c: 'ru-RU', b: 'ПРОЧИТАТЬ' },
            'tr': { l: "ABCÇDEFGĞHIİJKL".split(''), l2: "MNOÖPRSŞTUÜVYZ".split(''), c: 'tr-TR', b: 'OKU' },
            'en': { l: "ABCDEFGHIJKLM".split(''), l2: "NOPQRSTUVWXYZ".split(''), c: 'en-US', b: 'READ' }
        };
        let currentLang = 'ru-RU', activeObj = null, isDragging = false;
        const synth = window.speechSynthesis;

        async function initCamera() {
            const video = document.getElementById('input_video');
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const indexFinger = landmarks[8]; // Кончик указательного пальца

                    // Инвертируем X, так как видео зеркальное
                    const x = (1 - indexFinger.x) * window.innerWidth;
                    const y = indexFinger.y * window.innerHeight;

                    if (!isDragging) {
                        const target = document.elementFromPoint(x, y);
                        if (target && target.classList.contains('char-item')) {
                            startDrag(x, y, target.textContent);
                        }
                    } else {
                        move(x, y);
                        // Проверка пересечения со слотами в реальном времени
                        const overElement = document.elementFromPoint(x, y);
                        if (overElement && overElement.classList.contains('slot')) {
                            endDrag(x, y);
                        }
                    }
                }
            });

            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 640, height: 480
            });
            return cam.start();
        }

        function initApp(lang) {
            currentLang = data[lang].c;
            document.getElementById('read-btn').textContent = data[lang].b;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            
            synth.speak(new SpeechSynthesisUtterance("")); // Разблокировка голоса

            initCamera().catch(err => alert("Ошибка камеры: " + err));

            const sc = document.getElementById('slots-container');
            sc.innerHTML = '';
            for(let i=0; i<8; i++) sc.innerHTML += '<div class="slot"><span></span></div>';

            renderRow('top-row', data[lang].l);
            renderRow('bottom-row', data[lang].l2);

            const lp = document.getElementById('left-panel');
            lp.innerHTML = '';
            "01234".split('').forEach(n => lp.innerHTML += `<div class="digit-item" onclick="speak('${n}')">${n}</div>`);
            
            const rp = document.getElementById('right-panel');
            rp.innerHTML = '';
            "56789".split('').forEach(n => rp.innerHTML += `<div class="digit-item" onclick="speak('${n}')">${n}</div>`);
        }

        function renderRow(id, chars) {
            const row = document.getElementById(id); row.innerHTML = '';
            chars.forEach(c => {
                const div = document.createElement('div');
                div.className = 'char-item'; div.textContent = c;
                div.onmousedown = (e) => startDrag(e.clientX, e.clientY, c);
                div.ontouchstart = (e) => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY, c); };
                row.appendChild(div);
            });
        }

        function startDrag(x, y, c) {
            if (isDragging) return;
            isDragging = true; 
            speak(c);
            activeObj = document.createElement('div');
            activeObj.className = 'char-item dragging'; 
            activeObj.textContent = c;
            activeObj.style.left = (x - 32) + 'px'; 
            activeObj.style.top = (y - 32) + 'px';
            document.body.appendChild(activeObj);
        }

        function move(x, y) { 
            if(activeObj) { 
                activeObj.style.left = (x - 32) + 'px'; 
                activeObj.style.top = (y - 32) + 'px'; 
            } 
        }

        // Поддержка мыши и тача тоже остается
        window.onmousemove = (e) => { if(isDragging) move(e.clientX, e.clientY); };
        window.ontouchmove = (e) => { if(isDragging) move(e.touches[0].clientX, e.touches[0].clientY); };
        window.onmouseup = (e) => endDrag(e.clientX, e.clientY);
        window.ontouchend = (e) => endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);

        function endDrag(x, y) {
            if(!isDragging) return;
            const targetSlot = document.elementFromPoint(x, y);
            
            if(targetSlot && (targetSlot.classList.contains('slot') || targetSlot.parentElement.classList.contains('slot'))) {
                const slot = targetSlot.classList.contains('slot') ? targetSlot : targetSlot.parentElement;
                slot.querySelector('span').textContent = activeObj.textContent;
                speak(activeObj.textContent);
            }
            
            if(activeObj) activeObj.remove(); 
            isDragging = false;
            activeObj = null;
        }

        function readAll() {
            let word = ""; 
            document.querySelectorAll('.slot span').forEach(s => word += s.textContent);
            if(word) speak(word);
        }

        function clearSlots() { 
            document.querySelectorAll('.slot span').forEach(s => s.textContent = ""); 
        }

        function speak(t) { 
            synth.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = currentLang; 
            u.rate = 0.9; 
            synth.speak(u); 
        }
    </script>
</body>
</html>
